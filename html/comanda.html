<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Comandas - LekEat</title>
    <link rel="stylesheet" href="../css/variable.css">
    <link rel="stylesheet" href="../css/comandaStyles.css">
</head>
<body>
    <header class="comandas-header">
        <nav>
            <ul>
                <li><a href="home.html">Inicio</a></li>
                 <li><a><strong>Comandas</strong></a></li>
                <li><a href="menu.html">Menu</a></li>
               
            </ul>
        </nav>
    </header>

    <main class="comandas-main">
        <section class="comandas-container">
            <h2 class="search-title">Buscar</h2>
            
            <div class="comandas-controls">
                <div class="search-box">
                    <input type="text" id="search-comanda" placeholder="Buscar comanda por Nro de orden" 
                           oninput="buscarComanda()">
                </div>
            </div>

      
            <div id="lista-comandas" class="comandas-list"></div>
            
            <div id="cargando-comandas" class="loading">
                <p>Cargando comandas...</p>
            </div>
        </section>

        <div id="modal-comanda" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="cerrarModalComanda()">&times;</span>
                
                <h2>Comanda #<span id="comanda-numero"></span></h2>
                
                <div class="comanda-info">
                    <div class="info-item">
                        <span class="info-label">Estado</span>
                        <span id="comanda-estado" class="info-value"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Total</span>
                        <span id="comanda-total" class="info-value"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Fecha</span>
                        <span id="comanda-fecha" class="info-value"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Tipo entrega</span>
                        <span id="comanda-entrega" class="info-value"></span>
                    </div>
                </div>

                <div class="comanda-notes">
                    <h3>Notas de la Comanda</h3>
                    <p id="comanda-notas"></p>
                </div>

             
                <div class="comanda-items">
                    <h3>Items del Pedido</h3>
                    <div id="comanda-items" class="comanda-items-list"></div>  
                    
                </div>

                <div class="modal-buttons">
                    <button class="btn-secundario" onclick="cerrarModalComanda()">
                        Volver
                    </button>
                    <button class="btn-principal" onclick="agregarMasPlatos()">
                        Agregar Más Platos
                    </button>
                </div>
            </div>
        </div>
    </main>
    
    <div id="toast-notification" class="toast"></div>
    <script type="module" src="../js/pages/comandaPage.js"></script>
</body>
</html>
